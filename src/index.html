<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sistema administrativo en línea" />
    <title>Mi Sistema Administrativo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <nav class="nav" aria-label="Navegación principal">
        <a class="brand" href="/" aria-label="Inicio">
          <span class="brand-mark" aria-hidden="true">M</span>
          <span>MI SISTEMA</span>
        </a>
        <span class="status"><span class="status-dot"></span> En línea</span>
      </nav>

      <section class="hero" aria-labelledby="welcome-message">
        <div class="eyebrow">Sistema administrativo</div>
        <h1 id="welcome-message">Bienvenido</h1>
        <p class="subtitle">Tu espacio de trabajo está listo para crecer contigo.</p>
        <div class="card">
          <div class="card-icon" aria-hidden="true">✓</div>
          <div>
            <strong>Todo preparado</strong>
            <p>La primera versión de tu sistema ya está funcionando.</p>
          </div>
        </div>
      </section>

      <footer>Impulsado por Supabase · Publicado con Render</footer>
    </main>
    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
